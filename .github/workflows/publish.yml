name: Publish extension

# Publishes Ambience to the VS Code Marketplace and Open VSX.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   • VSCE_PAT  — Azure DevOps PAT with Marketplace "Manage" scope
#                 (publisher "AxelOllivier" must already exist).
#   • OVSX_PAT  — Open VSX access token (https://open-vsx.org/user-settings/tokens).
#
# Release flow:
#   1. bump "version" in package.json
#   2. git tag vX.Y.Z && git push --tags     → publishes to both stores
#   Or run manually from the Actions tab (workflow_dispatch) to target one store.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        default: both
        options: [both, vscode, openvsx]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20" # @vscode/vsce 3.x requires Node >= 20

      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1; }

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies -o ambience-themes.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'vscode' }}
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath ambience-themes.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Ensure Open VSX namespace exists (no-op if already created)
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'openvsx' }}
        continue-on-error: true
        run: npx --yes ovsx create-namespace AxelOllivier -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to Open VSX
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'openvsx' }}
        run: npx --yes ovsx publish ambience-themes.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload .vsix as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ambience-themes-vsix
          path: ambience-themes.vsix
